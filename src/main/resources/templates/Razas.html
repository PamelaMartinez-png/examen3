<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razas | adminHMD</title>
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/bootstrap-icons/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body>

<div class="admin-shell">
    <div class="sidebar-backdrop" data-sidebar-close></div>
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <a class="brand-mark" href="#">
                <span class="brand-icon"><i class="bi bi-grid-1x2-fill"></i></span>
                <span class="brand-title">Razas</span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-link" th:href="@{/mascotas}"><span class="nav-text">Mascotas</span></a>
            <a class="nav-link active" href="#"><span class="nav-text">Razas</span></a>
        </nav>
    </aside>

    <div class="admin-main">
        <main class="dashboard-content">
            <div class="container-fluid px-3 px-lg-4 py-4">
                <section class="panel">
                    <div class="panel-header d-flex justify-content-between align-items-center">
                        <h2 class="h5 mb-0 section-title">Catálogo de Razas</h2>
                    </div>

                    <div class="h5 mb-0 section-title">
                        <div class="row g-3 align-items-center">
                            <div class="col-auto">
                                <input type="text" class="form-control form-control-sm" id="nombreRaza" placeholder="Nombre de la nueva raza">
                            </div>
                            <div class="col-auto">
                                <button type="button" class="btn btn-success btn-sm" onclick="guardarRaza()"><i class="bi bi-plus-lg"></i> Agregar Raza</button>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Raza</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="raza : ${razas}">
                                <td th:text="${raza.id}"></td>
                                <td th:text="${raza.nombre}"></td>
                                <td class="text-end">
                                    <button class="btn btn-light btn-sm border" th:onclick="'eliminarRaza(' + ${raza.id} + ')'">
                                        <i class="bi bi-trash text-danger"></i>
                                    </button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/assets/js/main.js}"></script>
<script th:src="@{/assets/js/jspropios/razas-ajax.js}"></script>
</body>
</html>
