<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mascotas | adminHMD</title>
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/bootstrap-icons/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body>
<div class="admin-shell">
    <div class="sidebar-backdrop" data-sidebar-close></div>

    <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <a class="brand-mark" href="#">
                <span class="brand-icon"><i class="bi bi-grid-1x2-fill"></i></span>
                <span class="brand-copy">
            <span class="brand-title">JavaScript</span>
            <span class="brand-subtitle">Ejercicios</span>
          </span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-link active" href="#"><span class="nav-icon"><i class="bi bi-arrow-right-short"></i></span><span class="nav-text">Mascotas</span></a>
        </nav>
    </aside>

    <div class="admin-main">
        <main class="dashboard-content">
            <div class="container-fluid px-3 px-lg-4 py-4">

                <div class="page-heading">
                    <div class="page-heading-copy">
                        <span class="page-icon"><i class="bi bi-table"></i></span>
                        <div>
                            <p class="eyebrow mb-1">Index del departamental 1</p>
                            <h1 class="h3 mb-1">Lista de Mascotas</h1>
                        </div>
                    </div>
                </div>

                <section class="panel">
                    <div class="panel-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <h2 class="h5 mb-0 section-title">Registros</h2>
                        <button class="btn btn-success btn-sm" type="button"
                                data-bs-toggle="modal"
                                data-bs-target="#mascotaModal"
                                onclick="abrirModalCrear()">
                            <i class="bi bi-plus-lg"></i> Nueva

                        </button>
                        <a href="/razas" class="btn btn-success me-2">
                            <i class="bi bi-plus-circle"></i> Gestionar Razas
                        </a>
                        <button type="button" class="btn btn-primary" onclick="abrirModalCrear()">
                            Nueva Mascota
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table id="exampleMascotas" class="table align-middle mb-0">
                            <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Raza</th>
                                <th>Edad (Años)</th>
                                <th>Observaciones</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="mascota : ${mascotas}">
                                <td th:text="${mascota.nombre}"></td>
                                <td th:text="${mascota.raza}"></td>
                                <td th:text="${mascota.edad}"></td>
                                <td th:text="${mascota.observaciones}"></td>
                                <td class="text-end">
                                    <button class="btn btn-light btn-sm border me-1" th:onclick="'buscarMascotaPorId(' + ${mascota.id} + ')'">
                                        <i class="bi bi-pencil text-primary"></i>
                                    </button>
                                    <button class="btn btn-light btn-sm border" th:onclick="'eliminarMascota(' + ${mascota.id} + ')'">
                                        <i class="bi bi-trash text-danger"></i>
                                    </button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>

<div class="modal fade" id="mascotaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitulo">Nueva Mascota</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="mascotaId">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nom">
                </div>
                <div class="mb-3">
                    <label class="form-label">Raza</label>
<!--                    <select id="raz" class="form-select">-->
<!--                        <option value="">Seleccione</option>-->
<!--                        <option value="Gran Perro">Gran Perro</option>-->
<!--                        <option value="Pastor Aleman">Pastor Aleman</option>-->
<!--                    </select>-->
                        <select id="raz" class="form-select">
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Edad (Años)</label>
                    <input type="number" class="form-control" id="eda" value="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <textarea id="obs" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="guardarMascota()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/assets/js/main.js}"></script>
<script th:src="@{/js/mascotas-ajax.js}"></script>
<script>
    $(document).ready(function () {
        $('#exampleMascotas').DataTable({
            "responsive": true,
            "lengthChange": false,
            "autoWidth": false
        });
        cargarSelectRazas();

        listarMascotasDinámicas();
    });
</script>
</body>
</html>
