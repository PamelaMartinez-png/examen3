<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mascotas | adminHMD</title>
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/bootstrap-icons/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body>
<div class="admin-shell">
    <div class="sidebar-backdrop" data-sidebar-close></div>
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <a class="brand-mark" href="#">
                <span class="brand-icon"><i class="bi bi-grid-1x2-fill"></i></span>
                <span class="brand-copy">
                    <span class="brand-title">JavaScript</span>
                    <span class="brand-subtitle">Mascotas</span>
                </span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-link active" href="#"><span class="nav-icon"><i class="bi bi-arrow-right-short"></i></span><span class="nav-text">Mascotas</span></a>
        </nav>
    </aside>

    <div class="admin-main">
        <main class="dashboard-content">
            <div class="container-fluid px-3 px-lg-4 py-4">
                <div class="page-heading">
                    <div class="page-heading-copy">
                        <span class="page-icon"><i class="bi bi-table"></i></span>
                        <div>
                            <p class="eyebrow mb-1">Examen 3</p>
                            <h1 class="h3 mb-1">Lista de Mascotas</h1>
                        </div>
                    </div>
                </div>

                <section class="panel">
                    <div class="panel-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <h2 class="h5 mb-0 section-title">Registros</h2>
                        <div>
                            <button class="btn btn-success btn-sm me-2" type="button" onclick="abrirModalCrear()">
                                <i class="bi bi-plus-lg"></i> Nueva Mascota
                            </button>
                            <a href="/razas" class="btn btn-outline-secondary btn-sm">
                                <i class="bi bi-list-ul"></i> Gestionar Razas
                            </a>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Raza</th>
                                <th>Edad</th>
                                <th>Observaciones</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                            </thead>
                            <tbody id="cuerpoTabla">
                            <tr><td colspan="6" class="text-center text-muted py-3">Cargando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="mascotaModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitulo">Nueva Mascota</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="mascotaId">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nom" placeholder="Nombre de la mascota">
                </div>
                <div class="mb-3">
                    <label class="form-label">Raza</label>
                    <select id="raz" class="form-select">
                        <option value="">Seleccione una raza...</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Edad (Años)</label>
                    <input type="number" class="form-control" id="eda" value="0" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <textarea id="obs" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="guardarMascota()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/assets/js/main.js}"></script>
<!-- Ruta correcta donde tienes el archivo -->
<script th:src="@{/assets/js/jspropios/mascotas-ajax.js}"></script>
<script>
    $(document).ready(function () {
        listar();
    });
</script>
</body>
</html>
